<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="ball3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg3)"/>

  <!-- Basketball Court -->
  <rect x="100" y="150" width="600" height="350" fill="#8B4513" stroke="#654321" stroke-width="2"/>
  <rect x="120" y="170" width="560" height="310" fill="#DEB887" stroke="#D2691E" stroke-width="1"/>

  <!-- Court Lines -->
  <line x1="400" y1="170" x2="400" y2="480" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="400" cy="325" r="60" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="400" cy="325" r="3" fill="#FFFFFF"/>

  <!-- Basketball with trajectory -->
  <circle cx="550" cy="200" r="20" fill="url(#ball3)" stroke="#8B4513" stroke-width="2"/>
  <path d="M 530 185 Q 550 190 570 185" stroke="#8B4513" stroke-width="2" fill="none"/>
  <path d="M 530 205 Q 550 200 570 205" stroke="#8B4513" stroke-width="2" fill="none"/>

  <!-- Trajectory arc -->
  <path d="M 500 250 Q 550 200 600 150" stroke="#FFFFFF" stroke-width="3" stroke-dasharray="5,5" opacity="0.7" fill="none"/>

  <!-- Teen Player shooting -->
  <g transform="translate(450, 280)">
    <!-- Head -->
    <circle cx="0" cy="-30" r="15" fill="#4A5568"/>
    <!-- Body -->
    <rect x="-10" y="-15" width="20" height="40" fill="#2D3748"/>
    <!-- Shooting arm -->
    <rect x="-25" y="-20" width="20" height="8" fill="#4A5568" transform="rotate(-45)"/>
    <!-- Other arm -->
    <rect x="5" y="-10" width="15" height="8" fill="#4A5568"/>
    <!-- Legs -->
    <rect x="-8" y="25" width="6" height="25" fill="#4A5568"/>
    <rect x="2" y="25" width="6" height="25" fill="#4A5568"/>
  </g>

  <!-- Stars representing achievement -->
  <g transform="translate(150, 100)">
    <polygon points="10,0 13,7 20,7 15,12 17,19 10,15 3,19 5,12 0,7 7,7" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
  </g>
  <g transform="translate(200, 80)">
    <polygon points="8,0 10,5 15,5 12,9 13,14 8,11 3,14 4,9 1,5 6,5" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
  </g>
  <g transform="translate(180, 120)">
    <polygon points="6,0 8,4 12,4 9,7 10,11 6,8 2,11 3,7 0,4 4,4" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
  </g>

  <!-- Motivational Text Overlay -->
  <rect x="50" y="50" width="280" height="80" fill="rgba(0,0,0,0.7)" rx="10"/>
  <text x="190" y="85" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="bold">DREAM BIG</text>
  <text x="190" y="105" text-anchor="middle" fill="#A78BFA" font-family="Arial, sans-serif" font-size="20" font-weight="bold">PLAY BIGGER</text>
</svg>